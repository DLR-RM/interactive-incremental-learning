[tool.ruff]
# Same as Black.
line-length = 127
# Assume Python 3.12
target-version = "py312"

[tool.ruff.lint]
# See https://beta.ruff.rs/docs/rules/#ruff-specific-rules-ruf
select = ["E", "F", "B", "UP", "C90", "RUF"]
# B028: Ignore explicit stacklevel`
# RUF013: Too many false positives (implicit optional)
ignore = ["B028", "RUF013"]

[tool.ruff.lint.per-file-ignores]
# ClassVar, implicit optional check not needed for tests
"./tests/*.py" = ["RUF012", "RUF013"]

[tool.ruff.lint.mccabe]
# Unlike Flake8, default to a complexity level of 10.
max-complexity = 15

[tool.black]
line-length = 127

[tool.isort]
profile = "black"
line_length = 127
src_paths = ["interactive_incremental_learning"]

[tool.pytype]
inputs = ["interactive_incremental_learning"]
disable = []

[tool.mypy]
ignore_missing_imports = true
follow_imports = "silent"
show_error_codes = true

[tool.pytest.ini_options]
filterwarnings = [

]
markers = [
]

[tool.coverage.run]
disable_warnings = ["couldnt-parse"]
branch = false
omit = [
	"tests/*",
	"setup.py"
]

[tool.coverage.report]
exclude_lines = [
	"pragma: no cover",
	"raise NotImplementedError()",
	"if typing.TYPE_CHECKING:",
]
